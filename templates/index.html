<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spork</title>
</head>
<body>
    {% for key, value in films.items() %}
        <h1>{{ key }}</h1>
        <p>{{ value['genre'] }}</p>
        <p>{{ value['category'] }}</p>

        {% for projection in value['projections'] %}
            <p>{{ projection }}</p>
        {% endfor %}

        {% for info in value['infos'] %}
            <p>{{ info }}</p>
        {% endfor %}
    {% endfor %}
</body>
</html>
